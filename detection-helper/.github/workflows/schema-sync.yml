name: Schema Sync Check

on:
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  check-schema-staleness:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check upstream schema changes
        id: check
        run: |
          echo "=== Checking upstream schema staleness ==="
          
          # Key tables to check (representative sample)
          TABLES=(
            "deviceprocessevents"
            "devicefileevents"
            "deviceregistryevents"
            "devicenetworkevents"
            "devicelogonevents"
            "deviceimageloadevents"
            "deviceevents"
          )
          
          CHANGES_FOUND=0
          CHANGES_LOG=""
          
          for table in "${TABLES[@]}"; do
            LOCAL_FILE="detection-helper/docs/advanced-hunting/advanced-hunting-${table}-table.md"
            UPSTREAM_URL="https://raw.githubusercontent.com/MicrosoftDocs/defender-docs/public/defender-xdr/advanced-hunting-${table}-table.md"
            
            if [ -f "$LOCAL_FILE" ]; then
              echo "Checking ${table}..."
              # Download upstream and compare (strip frontmatter for cleaner diff)
              curl -sL "$UPSTREAM_URL" -o "/tmp/upstream-${table}.md" || {
                echo "  WARNING: Failed to fetch upstream for ${table}"
                continue
              }
              
              # Simple size comparison first
              LOCAL_SIZE=$(wc -c < "$LOCAL_FILE")
              UPSTREAM_SIZE=$(wc -c < "/tmp/upstream-${table}.md")
              SIZE_DIFF=$((UPSTREAM_SIZE - LOCAL_SIZE))
              SIZE_DIFF_ABS=${SIZE_DIFF#-}
              
              if [ "$SIZE_DIFF_ABS" -gt 500 ]; then
                CHANGES_FOUND=1
                CHANGES_LOG="${CHANGES_LOG}\n- ${table}: Size changed by ${SIZE_DIFF} bytes (local: ${LOCAL_SIZE}, upstream: ${UPSTREAM_SIZE})"
                echo "  DIFFERENCE DETECTED in ${table}"
              else
                echo "  OK (${table})"
              fi
            else
              echo "  WARNING: Local file not found: ${LOCAL_FILE}"
            fi
          done
          
          # Check VERSION file age
          VERSION_FILE="detection-helper/docs/VERSION"
          if [ -f "$VERSION_FILE" ]; then
            LAST_UPDATED=$(grep "Last Updated" "$VERSION_FILE" | head -1)
            echo "\n${LAST_UPDATED}"
          fi
          
          # Output results
          echo "changes_found=${CHANGES_FOUND}" >> $GITHUB_OUTPUT
          {
            echo "changes_log<<EOF"
            echo -e "$CHANGES_LOG"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create issue if schema changes detected
        if: steps.check.outputs.changes_found == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const changesLog = `${{ steps.check.outputs.changes_log }}`;
            const title = `[Schema Sync] Upstream changes detected — review needed (${new Date().toISOString().split('T')[0]})`;
            const body = `## Automated Schema Staleness Check

            The weekly sync check detected differences between local schema files and the upstream MicrosoftDocs/defender-docs repository.

            ### Affected tables
            ${changesLog || '(Size-based diff — manual review required)'}

            ### Required actions
            - [ ] Review diff for each affected table
            - [ ] Update local files if changes are substantive
            - [ ] Update \`docs/VERSION\` with new sync date
            - [ ] Update \`docs/index/telemetry-index.json\` if columns or ActionTypes changed
            - [ ] Run validation queries to confirm tenant compatibility
            - [ ] Close this issue when complete

            ### Files to update
            \`\`\`
            docs/advanced-hunting/advanced-hunting-<table>-table.md
            docs/VERSION
            docs/index/telemetry-index.json (if schema changed)
            \`\`\`

            _This issue was auto-generated by the schema-sync workflow._`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['schema-sync', 'automation']
            });

  check-pattern-validity:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    needs: check-schema-staleness
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate detection patterns against schema
        id: validate
        run: |
          echo "=== Validating detection patterns ==="
          
          # Extract ActionTypes from detection patterns
          PATTERN_ACTIONS=$(grep -rohP 'ActionType == "\K[^"]+' detection-helper/docs/detection-patterns/ detection-helper/docs/detection-fragments/ 2>/dev/null | sort -u)
          
          # Extract columns from detection patterns
          PATTERN_COLUMNS=$(grep -rohP 'project\s+[^|]+' detection-helper/docs/detection-patterns/ detection-helper/docs/detection-fragments/ 2>/dev/null | grep -oP '\b[A-Z][a-zA-Z]+\b' | sort -u)
          
          ISSUES=""
          
          # Check if any pattern ActionType appears in schema files
          for action in $PATTERN_ACTIONS; do
            # Check if ActionType appears in any tenant actiontypes file
            if ! grep -rq "$action" detection-helper/docs/tenant/actiontypes/ 2>/dev/null; then
              # Not in tenant data — check if it's in telemetry-index
              if ! grep -q "$action" detection-helper/docs/index/telemetry-index.json 2>/dev/null; then
                ISSUES="${ISSUES}\n- ActionType \`$action\` used in pattern but not found in tenant data or telemetry index"
              fi
            fi
          done
          
          # Check VERSION age
          VERSION_FILE="detection-helper/docs/VERSION"
          if [ -f "$VERSION_FILE" ]; then
            LAST_UPDATED=$(grep "Last Updated" "$VERSION_FILE" | grep -oP '\d{4}-\d{2}-\d{2}')
            DAYS_OLD=$(( ($(date +%s) - $(date -d "$LAST_UPDATED" +%s)) / 86400 ))
            if [ "$DAYS_OLD" -gt 30 ]; then
              ISSUES="${ISSUES}\n- Schema corpus is ${DAYS_OLD} days old (threshold: 30). Consider updating."
            fi
          fi
          
          if [ -n "$ISSUES" ]; then
            echo "issues_found=1" >> $GITHUB_OUTPUT
            {
              echo "issues<<EOF"
              echo -e "$ISSUES"
              echo "EOF"
            } >> $GITHUB_OUTPUT
          else
            echo "issues_found=0" >> $GITHUB_OUTPUT
          fi

      - name: Create issue if pattern issues found
        if: steps.validate.outputs.issues_found == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const issues = `${{ steps.validate.outputs.issues }}`;
            const title = `[Pattern Validation] Issues detected (${new Date().toISOString().split('T')[0]})`;
            const body = `## Automated Pattern Validation

            Pattern files were checked against schema and tenant data.

            ### Issues
            ${issues || '(none detailed)'}

            ### Required actions
            - [ ] Verify unconfirmed ActionTypes against latest schema
            - [ ] Update pattern files if ActionTypes were renamed
            - [ ] Update \`docs/index/telemetry-index.json\` if needed
            - [ ] Refresh tenant actiontypes data

            _This issue was auto-generated by the schema-sync workflow._`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['schema-sync', 'pattern-validation', 'automation']
            });

      - name: Report pattern status
        run: |
          if [ "${{ steps.validate.outputs.issues_found }}" == "1" ]; then
            echo "⚠️ Pattern validation issues detected"
          else
            echo "✅ All patterns valid against current schema"
          fi

  report-summary:
    runs-on: ubuntu-latest
    needs: [check-schema-staleness, check-pattern-validity]
    if: always()

    steps:
      - name: Final status
        run: |
          echo "=== Schema & Pattern Sync Summary ==="
          echo "Schema check: ${{ needs.check-schema-staleness.result }}"
          echo "Pattern check: ${{ needs.check-pattern-validity.result }}"
          if [ "${{ needs.check-schema-staleness.result }}" == "success" ] && [ "${{ needs.check-pattern-validity.result }}" == "success" ]; then
            echo "✅ All checks passed"
          else
            echo "⚠️ Some checks require attention — see issues above"
          fi
